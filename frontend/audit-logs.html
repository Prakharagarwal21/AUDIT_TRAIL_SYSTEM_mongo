<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Audit Trail DBMS - Audit Logs</title>
    <link rel="stylesheet" href="/style.css" />
    <script defer src="/script.js"></script>
  </head>
  <body>
    <div class="topnav">
      <div class="topnav-inner">
        <div class="brand">Audit Trail DBMS</div>
        <div class="tabs" id="navTabs">
          <a class="tab" href="/dashboard">👥 Employees</a>
          <a class="tab" href="/profile">👤 Profile</a>
          <a class="tab" href="/staff-management" data-admin-only="1">🔐 Staff Management</a>
          <a class="tab" href="/bonus-management" data-admin-only="1">💰 Bonus Management</a>
          <a class="tab active" href="/audit-logs" data-admin-only="1">🧾 Audit Logs</a>
        </div>
        <div class="userbox">
          <div class="avatar" id="navAvatar"><span style="font-weight:900;color:#1d4ed8;">A</span></div>
          <div class="user-meta">
            <div class="name" id="navName">Loading…</div>
            <div class="role" id="navRole">—</div>
          </div>
          <button class="btn" id="logoutBtn">Logout</button>
        </div>
      </div>
    </div>

    <div class="container">
      <h1>Audit Logs</h1>
      <h2>Search and filter audit events</h2>

      <div class="card" style="margin-top:14px;">
        <div class="row">
          <div>
            <label>User (exact)</label>
            <input id="filterUser" placeholder="prakhar" />
          </div>
          <div class="tight" style="min-width:220px;">
            <label>Action</label>
            <select id="filterAction">
              <option value="">(any)</option>
              <option>LOGIN_SUCCESS</option>
              <option>LOGIN_FAILED</option>
              <option>CREATE</option>
              <option>UPDATE</option>
              <option>DELETE</option>
              <option>UPLOAD</option>
              <option>DOWNLOAD</option>
              <option>USER_CREATED</option>
              <option>PERMISSION_CHANGED</option>
            </select>
          </div>
          <div class="tight" style="min-width:180px;">
            <label>Start</label>
            <input id="filterStart" placeholder="2026-03-01" />
          </div>
          <div class="tight" style="min-width:180px;">
            <label>End</label>
            <input id="filterEnd" placeholder="2026-03-31" />
          </div>
        </div>

        <div class="row" style="margin-top:10px;">
          <div>
            <label>Keyword</label>
            <input id="searchQ" placeholder="employee: or bonus:" />
          </div>
          <div class="tight" style="min-width:160px;">
            <label>&nbsp;</label>
            <button class="btn" id="applyFilterBtn" type="button">Apply filters</button>
          </div>
          <div class="tight" style="min-width:140px;">
            <label>&nbsp;</label>
            <button class="btn" id="searchBtn" type="button">Search</button>
          </div>
          <div class="tight" style="min-width:120px;">
            <label>&nbsp;</label>
            <button class="btn" id="clearBtn" type="button">Clear</button>
          </div>
          <div class="tight" style="min-width:140px;">
            <label>&nbsp;</label>
            <button class="btn primary" id="exportBtn" type="button">Export CSV</button>
          </div>
        </div>

        <div id="logsMsg" class="msg" style="display:none;"></div>

        <table aria-label="Audit logs table">
          <thead>
            <tr>
              <th>User</th>
              <th>Action</th>
              <th>Resource</th>
              <th>Severity</th>
              <th>Time</th>
              <th>IP</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="logsTbody"></tbody>
        </table>

        <div class="row" style="margin-top:10px;">
          <button class="btn" id="loadMoreBtn" type="button">Load more</button>
        </div>
      </div>
    </div>
  </body>
</html>
