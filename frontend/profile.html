<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Audit Trail DBMS - Profile</title>
    <link rel="stylesheet" href="/style.css" />
    <script defer src="/script.js"></script>
  </head>
  <body>
    <div class="topnav">
      <div class="topnav-inner">
        <div class="brand">Audit Trail DBMS</div>
        <div class="tabs" id="navTabs">
          <a class="tab" href="/dashboard">👥 Employees</a>
          <a class="tab active" href="/profile">👤 Profile</a>
          <a class="tab" href="/staff-management" data-admin-only="1">🔐 Staff Management</a>
          <a class="tab" href="/bonus-management" data-admin-only="1">💰 Bonus Management</a>
          <a class="tab" href="/audit-logs" data-admin-only="1">🧾 Audit Logs</a>
        </div>
        <div class="userbox">
          <div class="avatar" id="navAvatar"><span style="font-weight:900;color:#1d4ed8;">A</span></div>
          <div class="user-meta">
            <div class="name" id="navName">Loading…</div>
            <div class="role" id="navRole">—</div>
          </div>
          <button class="btn" id="logoutBtn">Logout</button>
        </div>
      </div>
    </div>

    <div class="container">
      <div class="card" style="max-width:900px;margin:0 auto;">
        <h1>My Profile</h1>
        <h2>Manage your profile information and picture</h2>

        <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:14px;">
          <div style="font-weight:800;">Current Profile</div>
          <div class="row" style="margin-top:12px;align-items:center;">
            <div class="tight" style="min-width:auto;">
              <div class="avatar" id="profileAvatar" style="width:64px;height:64px;"></div>
            </div>
            <div>
              <div style="font-weight:800;" id="profileName">—</div>
              <div style="color:var(--muted);font-size:13px;" id="profileRole">—</div>
              <div style="color:var(--muted);font-size:12px;" id="profileId">—</div>
              <div style="color:var(--muted);font-size:12px;" id="profileLastLogin">—</div>
            </div>
            <div class="tight" style="min-width:auto;margin-left:auto;">
              <button class="btn danger" id="removePhotoBtn" type="button">Remove Picture</button>
            </div>
          </div>
        </div>

        <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:14px;">
          <div style="font-weight:800;">Update Profile Picture</div>
          <div style="margin-top:10px;">
            <label for="photoFile">Choose New Profile Picture</label>
            <input id="photoFile" type="file" accept="image/*" />
            <div style="margin-top:6px;color:var(--muted);font-size:12px;">Supported: JPEG, PNG, GIF, WebP. Max: 5MB.</div>
          </div>
          <div class="row" style="margin-top:10px;">
            <button class="btn primary tight" id="uploadPhotoBtn" type="button">Upload</button>
          </div>
          <div id="photoMsg" class="msg" style="display:none;"></div>
        </div>

        <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:14px;">
          <div style="font-weight:800;">Change Password</div>
          <div class="row" style="margin-top:10px;">
            <div>
              <label for="currentPassword">Current Password</label>
              <input id="currentPassword" type="password" />
            </div>
            <div>
              <label for="newPassword">New Password</label>
              <input id="newPassword" type="password" />
            </div>
          </div>
          <div class="row" style="margin-top:10px;">
            <button class="btn primary tight" id="changePasswordBtn" type="button">Change Password</button>
          </div>
          <div id="passMsg" class="msg" style="display:none;"></div>
        </div>

      </div>
    </div>
  </body>
</html>
